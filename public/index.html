<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoanIQ - AI-Powered Loan Eligibility Predictor</title>
    <meta name="description" content="Predict your loan eligibility instantly using AI-powered machine learning. Get confidence scores and detailed analysis.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-animation"></div>
    <div class="container">
        <header>
            <div class="logo-icon">🎯</div>
            <h1>LoanIQ</h1>
            <p class="subtitle">AI-Powered Loan Eligibility Predictor</p>
        </header>

        <main>
            <form id="loanForm">
                <div class="section-title">Personal Details</div>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="Gender">Gender</label>
                        <select id="Gender" name="Gender" required>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="Married">Married</label>
                        <select id="Married" name="Married" required>
                            <option value="Yes">Yes</option>
                            <option value="No">No</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="Dependents">Dependents</label>
                        <select id="Dependents" name="Dependents" required>
                            <option value="0">0</option>
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3+">3+</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="Education">Education</label>
                        <select id="Education" name="Education" required>
                            <option value="Graduate">Graduate</option>
                            <option value="Not Graduate">Not Graduate</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="Self_Employed">Self Employed</label>
                        <select id="Self_Employed" name="Self_Employed" required>
                            <option value="No">No</option>
                            <option value="Yes">Yes</option>
                        </select>
                    </div>
                </div>

                <div class="section-title">Financial Details</div>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="ApplicantIncome">Applicant Income (₹)</label>
                        <input type="number" id="ApplicantIncome" name="ApplicantIncome" placeholder="e.g. 50000" required min="0">
                    </div>

                    <div class="form-group">
                        <label for="CoapplicantIncome">Coapplicant Income (₹)</label>
                        <input type="number" id="CoapplicantIncome" name="CoapplicantIncome" placeholder="e.g. 20000" required min="0">
                    </div>

                    <div class="form-group">
                        <label for="LoanAmount">Loan Amount (₹)</label>
                        <input type="number" id="LoanAmount" name="LoanAmount" placeholder="e.g. 150000" required min="1">
                    </div>

                    <div class="form-group">
                        <label for="Loan_Amount_Term">Loan Term (Days)</label>
                        <input type="number" id="Loan_Amount_Term" name="Loan_Amount_Term" required value="360" min="1">
                    </div>

                    <div class="form-group">
                        <label for="Credit_History">Credit History</label>
                        <select id="Credit_History" name="Credit_History" required>
                            <option value="1">Good (1.0)</option>
                            <option value="0">Bad (0.0)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="Property_Area">Property Area</label>
                        <select id="Property_Area" name="Property_Area" required>
                            <option value="Urban">Urban</option>
                            <option value="Semiurban">Semiurban</option>
                            <option value="Rural">Rural</option>
                        </select>
                    </div>
                </div>

                <button type="submit" id="submitBtn">
                    <span class="btn-text">Predict Eligibility</span>
                    <span class="btn-loader hidden">⏳ Analyzing...</span>
                </button>
            </form>

            <div id="result" class="hidden">
                <div id="resultIcon" class="result-icon"></div>
                <h2 id="predictionText"></h2>
                <p id="confidenceText"></p>
                <div class="progress-bar-container">
                    <div id="progressBar" class="progress-bar"></div>
                </div>
                <div id="probDetails" class="prob-details"></div>
            </div>
        </main>

        <footer>
            <p>Built with ❤️ using Machine Learning &bull; Random Forest Classifier</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
