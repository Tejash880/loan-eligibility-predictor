<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoanIQ - Loan Eligibility Predictor</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>LoanIQ</h1>
            <p>AI-Powered Loan Eligibility Predictor</p>
        </header>
        
        <main>
            <form id="loanForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="Gender">Gender</label>
                        <select id="Gender" name="Gender" required>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="Married">Married</label>
                        <select id="Married" name="Married" required>
                            <option value="Yes">Yes</option>
                            <option value="No">No</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="Dependents">Dependents</label>
                        <select id="Dependents" name="Dependents" required>
                            <option value="0">0</option>
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3+">3+</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="Education">Education</label>
                        <select id="Education" name="Education" required>
                            <option value="Graduate">Graduate</option>
                            <option value="Not Graduate">Not Graduate</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="Self_Employed">Self Employed</label>
                        <select id="Self_Employed" name="Self_Employed" required>
                            <option value="No">No</option>
                            <option value="Yes">Yes</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="ApplicantIncome">Applicant Income (₹)</label>
                        <input type="number" id="ApplicantIncome" name="ApplicantIncome" required min="0">
                    </div>
                    
                    <div class="form-group">
                        <label for="CoapplicantIncome">Coapplicant Income (₹)</label>
                        <input type="number" id="CoapplicantIncome" name="CoapplicantIncome" required min="0">
                    </div>
                    
                    <div class="form-group">
                        <label for="LoanAmount">Loan Amount (₹)</label>
                        <input type="number" id="LoanAmount" name="LoanAmount" required min="1">
                    </div>
                    
                    <div class="form-group">
                        <label for="Loan_Amount_Term">Loan Amount Term (Days)</label>
                        <input type="number" id="Loan_Amount_Term" name="Loan_Amount_Term" required value="360" min="1">
                    </div>
                    
                    <div class="form-group">
                        <label for="Credit_History">Credit History</label>
                        <select id="Credit_History" name="Credit_History" required>
                            <option value="1">Good (1.0)</option>
                            <option value="0">Bad (0.0)</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="Property_Area">Property Area</label>
                        <select id="Property_Area" name="Property_Area" required>
                            <option value="Urban">Urban</option>
                            <option value="Semiurban">Semiurban</option>
                            <option value="Rural">Rural</option>
                        </select>
                    </div>
                </div>
                
                <button type="submit" id="submitBtn">Predict Eligibility</button>
            </form>
            
            <div id="result" class="hidden">
                <h2 id="predictionText"></h2>
                <p id="confidenceText"></p>
                <div class="progress-bar-container">
                    <div id="progressBar" class="progress-bar"></div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
